<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>mt798x EEPROM 功率修改工具</title>

	<meta id="meta-keywords" name="keywords" content="mt798x, EEPROM, 功率修改, 工具">
	<meta id="meta-description" name="description" content="一个用于修改mt798x EEPROM功率的工具，支持直观的界面操作。">

    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="mask-icon" href="/images/logo.svg" color="#000">

	<style>
		:root {
			color-scheme: dark;
			--bg: #0f172a;
			--bg-2: #111827;
			--panel: rgba(255, 255, 255, 0.06);
			--panel-border: rgba(255, 255, 255, 0.14);
			--text: rgba(255, 255, 255, 0.94);
			--muted: rgba(255, 255, 255, 0.68);
			--primary: #60a5fa;
			--primary-2: #a78bfa;
			--ok: #22c55e;
			--warn: #f59e0b;
			--danger: #ef4444;
			--diff: rgba(34, 197, 94, 0.28);
			--radius: 14px;
		}

		@media (prefers-color-scheme: light) {
			:root {
				color-scheme: light;
				--bg: #f3f6ff;
				--bg-2: #ffffff;
				--panel: rgba(15, 23, 42, 0.04);
				--panel-border: rgba(15, 23, 42, 0.14);
				--text: rgba(15, 23, 42, 0.92);
				--muted: rgba(15, 23, 42, 0.66);
				--primary: #3b82f6;
				--primary-2: #8b5cf6;
				--diff: rgba(22, 163, 74, 0.22);
			}
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 12% 0%, rgba(96, 165, 250, 0.23), transparent 42%),
				radial-gradient(circle at 88% 10%, rgba(167, 139, 250, 0.22), transparent 42%),
				linear-gradient(145deg, var(--bg), var(--bg-2));
			padding: 18px;
		}

		.app {
			width: min(1240px, 100%);
			margin: 0 auto;
			display: grid;
			gap: 14px;
		}

		.panel {
			border: 1px solid var(--panel-border);
			border-radius: var(--radius);
			background: var(--panel);
			backdrop-filter: blur(10px);
			box-shadow: 0 14px 36px rgba(0, 0, 0, 0.2);
			overflow: hidden;
		}

		.panel-header {
			padding: 14px 16px;
			border-bottom: 1px solid var(--panel-border);
		}

		.panel-header h1,
		.panel-header h2 {
			margin: 0;
			font-size: 21px;
		}

		.panel-header h2 { font-size: 18px; }

		.panel-header p {
			margin: 8px 0 0;
			font-size: 13px;
			color: var(--muted);
		}

		.panel-body { padding: 14px 16px 16px; }

		.lang-switch {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
			flex-wrap: wrap;
			margin-bottom: 10px;
		}

		.lang-switch-label {
			font-size: 13px;
			color: var(--muted);
		}

		.lang-options {
			display: inline-flex;
			gap: 6px;
		}

		.lang-btn {
			appearance: none;
			border: 1px solid var(--panel-border);
			border-radius: 999px;
			padding: 6px 10px;
			font-size: 12px;
			font-weight: 700;
			color: var(--text);
			background: rgba(255, 255, 255, 0.04);
			cursor: pointer;
		}

		.lang-btn.active {
			border-color: rgba(96, 165, 250, 0.7);
			background: rgba(96, 165, 250, 0.16);
		}

		.grid {
			display: grid;
			gap: 12px;
			grid-template-columns: repeat(2, minmax(0, 1fr));
		}

		.chip-card {
			border: 1px solid var(--panel-border);
			border-radius: 12px;
			background: rgba(255, 255, 255, 0.03);
			padding: 12px;
			display: grid;
			gap: 8px;
		}

		.chip-card input { accent-color: var(--primary); }

		.chip-card.active {
			border-color: rgba(96, 165, 250, 0.6);
			box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.25);
		}

		.chip-title {
			display: flex;
			align-items: center;
			gap: 8px;
			font-weight: 700;
		}

		.chip-info {
			margin: 0;
			color: var(--muted);
			font-size: 12px;
			line-height: 1.5;
		}

		.field {
			display: grid;
			gap: 8px;
			margin-top: 12px;
		}

		.field label {
			color: var(--muted);
			font-size: 13px;
		}

		input[type="text"],
		input[type="file"] {
			border: 1px solid var(--panel-border);
			border-radius: 10px;
			padding: 10px;
			background: rgba(255, 255, 255, 0.04);
			color: var(--text);
			font-size: 14px;
		}

		.dropzone {
			border: 1px dashed var(--panel-border);
			border-radius: 12px;
			padding: 18px;
			text-align: center;
			color: var(--muted);
			background: rgba(255, 255, 255, 0.02);
			transition: .15s ease;
			cursor: pointer;
		}

		.dropzone input[type="file"] {
			display: none;
		}

		.dropzone-title {
			display: block;
			font-size: 14px;
			color: var(--text);
			font-weight: 700;
		}

		.dropzone-sub {
			display: block;
			margin-top: 6px;
			font-size: 12px;
			color: var(--muted);
		}

		.dropzone.dragover {
			border-color: rgba(96, 165, 250, 0.7);
			background: rgba(96, 165, 250, 0.12);
			color: var(--text);
		}

		.actions {
			margin-top: 12px;
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.btn {
			appearance: none;
			border: 1px solid var(--panel-border);
			border-radius: 10px;
			padding: 9px 12px;
			font-size: 13px;
			font-weight: 700;
			color: var(--text);
			background: rgba(255, 255, 255, 0.05);
			cursor: pointer;
		}

		.btn:hover { border-color: rgba(96, 165, 250, 0.55); }

		.btn-primary {
			border: 0;
			color: #fff;
			background: linear-gradient(100deg, var(--primary), var(--primary-2));
		}

		.btn[disabled] {
			opacity: .5;
			cursor: not-allowed;
		}

		.hint {
			margin: 10px 0 0;
			font-size: 13px;
			color: var(--muted);
		}

		.hint.ok { color: var(--ok); }
		.hint.warn { color: var(--warn); }
		.hint.error { color: var(--danger); }

		.compare-wrap {
			display: grid;
			gap: 12px;
			grid-template-columns: repeat(2, minmax(0, 1fr));
		}

		.compare-box {
			border: 1px solid var(--panel-border);
			border-radius: 12px;
			overflow: hidden;
			min-height: 360px;
			display: grid;
			grid-template-rows: auto 1fr;
		}

		.compare-title {
			padding: 8px 10px;
			border-bottom: 1px solid var(--panel-border);
			font-size: 13px;
			color: var(--muted);
		}

		.hex-view {
			margin: 0;
			padding: 10px;
			overflow: auto;
			white-space: pre;
			font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
		}

		.changed {
			background: var(--diff);
			border-radius: 4px;
			padding: 0 1px;
		}

		.meta {
			display: grid;
			gap: 6px;
			margin-top: 10px;
			font-size: 12px;
			color: var(--muted);
		}

		@media (max-width: 960px) {
			.grid,
			.compare-wrap {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>
	<main id="main-app" class="app" aria-label="mt798x EEPROM 功率修改工具">
		<section class="panel">
			<div class="panel-header">
				<h1 id="main-title">mt798x EEPROM 功率修改工具</h1>
				<p id="main-desc">请先选择芯片方案，再上传 Factory EEPROM（二进制）并填写参数（20~2D）。</p>
			</div>
			<div class="panel-body">
				<div class="lang-switch" aria-label="language switcher">
					<span id="lang-switch-label" class="lang-switch-label">语言</span>
					<div class="lang-options" id="lang-options">
						<button class="lang-btn active" type="button" data-lang-mode="auto">Auto</button>
						<button class="lang-btn" type="button" data-lang-mode="zh-CN">简体中文</button>
						<button class="lang-btn" type="button" data-lang-mode="en">English</button>
					</div>
				</div>

				<div class="grid" id="chip-cards">
					<label class="chip-card active" data-chip="mt7976">
						<div class="chip-title"><input type="radio" name="chip" value="mt7976" checked><span id="chip-title-mt7976">mt7976（mt7981内置PA / mt7986外置FEM）</span></div>
						<p id="chip-info-mt7976" class="chip-info">参考偏移：5G 为 0x441~0x458，2.4G 为 0x465~0x484（含边界）。将对应字节改为同一参数值。</p>
					</label>
					<label class="chip-card" data-chip="mt7975">
						<div class="chip-title"><input type="radio" name="chip" value="mt7975"><span id="chip-title-mt7975">mt7975（mt7986内置FEM）</span></div>
						<p id="chip-info-mt7975" class="chip-info">参考偏移：0x34B~0x352、0x357~0x35E、0x363~0x36A、0x36F~0x376（含边界）。</p>
					</label>
				</div>

				<div class="field">
					<label id="value-label" for="value-input">功率参数（十六进制，范围 20~2D）</label>
					<input id="value-input" type="text" value="2B" maxlength="2" placeholder="例如 2B">
				</div>

				<div class="field">
					<label id="file-label" for="file-input">上传 EEPROM 文件（.bin / .img，最大 2MB）</label>
					<label id="dropzone" class="dropzone" for="file-input">
						<span id="dropzone-title" class="dropzone-title">点击选择文件 或 直接拖拽到此处</span>
						<span id="dropzone-sub" class="dropzone-sub">支持 .bin / .img，大小不超过 2MB</span>
						<input id="file-input" type="file" accept=".bin,.img">
					</label>
				</div>

				<div class="actions">
					<button id="apply-btn" class="btn btn-primary" type="button" disabled>生成修改文件</button>
					<button id="download-btn" class="btn" type="button" disabled>下载修改后文件</button>
				</div>

				<div class="meta" id="meta"></div>
				<p id="hint" class="hint">等待上传文件。</p>
			</div>
		</section>

		<section class="panel">
			<div class="panel-header">
				<h2 id="compare-heading">片段对比（约 0x1000 大小）</h2>
				<p id="compare-desc">左侧原始内容，右侧修改后内容；坐标轴为地址行（Y）和列（X），修改字节已高亮。</p>
			</div>
			<div class="panel-body">
				<div class="compare-wrap">
					<div class="compare-box">
						<div id="before-title" class="compare-title">原始 EEPROM</div>
						<pre id="before-view" class="hex-view">(等待生成)</pre>
					</div>
					<div class="compare-box">
						<div id="after-title" class="compare-title">修改后 EEPROM</div>
						<pre id="after-view" class="hex-view">(等待生成)</pre>
					</div>
				</div>
			</div>
		</section>
	</main>

					compare_waiting_after_apply: '(Preview appears after clicking "Generate Patched File")',

					err_file_too_large: 'File size must not exceed 2MB.',

					[0x465, 0x484]

			function normalizeLang(input) {
				var lang = (input || '').toLowerCase();
				if (lang.indexOf('zh') === 0) return 'zh-CN';
				return 'en';
			}

			function loadLangMode() {
				try {
					var saved = localStorage.getItem(LANG_STORAGE_KEY);
					if (saved === 'auto' || saved === 'zh-CN' || saved === 'en') return saved;
				} catch (e) {
					// ignore storage read errors
				}
				return 'auto';
			}

			function resolveLang(mode) {
				if (mode === 'zh-CN' || mode === 'en') return mode;
				var nav = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
				return normalizeLang(nav);
			}

			var state = {
				file: null,
				originalBytes: null,
				modifiedBytes: null,
				filename: '',
				md5: '',
				changedOffsets: [],
				patchValue: 0x2B,
				chip: 'mt7976',
				compareStatus: 'waiting',
				langMode: loadLangMode(),
				lang: 'zh-CN',
				hintKey: 'hint_waiting_upload',
				hintParams: null,
				hintType: ''
			};

			state.lang = resolveLang(state.langMode);

			function t(key, params) {
				var dict = I18N[state.lang] || I18N.en;
				var fallback = I18N.en;
				var text = dict[key] || fallback[key] || key;
				if (!params) return text;
				return text.replace(/\{([^}]+)\}/g, function (_, p1) {
					if (Object.prototype.hasOwnProperty.call(params, p1)) {
						return String(params[p1]);
					}
					return _;
				});
			}

			function updateLangButtons() {

				var center = Math.floor((min + max) / 2);
				var start = center - Math.floor(WINDOW_SIZE / 2);
				if (start < 0) start = 0;
				var end = start + WINDOW_SIZE;

				lines.push('-------+------------------------------------------------');
				for (var addr = start; addr < end; addr += 16) {
					var row = toHex(addr, 6) + ' | ';
					for (var i = 0; i < 16; i++) {
						var p = addr + i;
						if (p >= end) {
							row += '   ';
							continue;

						var byteHex = toHex(bytes[p], 2);
						if (highlight && changedSet.has(p)) {

						} else {

						row += ' ';

					downloadBtn.disabled = true;

				reader.onload = function (e) {
					state.file = file;
					state.originalBytes = new Uint8Array(e.target.result);
					state.modifiedBytes = null;
					state.filename = '';
					state.md5 = '';
					state.changedOffsets = [];
					state.compareStatus = 'after-load';
					downloadBtn.disabled = true;
					updateApplyState();
					setHintByKey('ok_file_loaded', 'ok', { name: file.name, size: file.size });
					beforeView.textContent = t('compare_waiting_after_apply');
					afterView.textContent = t('compare_waiting_after_apply');
					meta.textContent = '';

					setHintByKey('err_file_read', 'error');

			}

			for (var j = 0; j < langButtons.length; j++) {
				langButtons[j].addEventListener('click', function (e) {
					var mode = e.currentTarget.getAttribute('data-lang-mode');
					if (!mode || mode === state.langMode) return;
					setLanguageMode(mode);
				});
			}

			applyBtn.addEventListener('click', doPatchAndPreview);

			downloadBtn.addEventListener('click', function () {
				if (!state.modifiedBytes || !state.filename) return;
				var blob = new Blob([state.modifiedBytes], { type: 'application/octet-stream' });
				var url = URL.createObjectURL(blob);
				var a = document.createElement('a');
				a.href = url;
				a.download = state.filename;
				document.body.appendChild(a);
				a.click();
				document.body.removeChild(a);
				URL.revokeObjectURL(url);
				setHintByKey('ok_download_triggered', 'ok', { filename: state.filename });
			});

			updateLangButtons();
			applyI18nToDom();
			setHintByKey('hint_waiting_upload');
			updateApplyState();
		})();
	</script>
</body>

</html>
